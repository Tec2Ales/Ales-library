<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТАиИ — Цеховая библиотека</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #1a1a1a;
            color: white;
            padding: 20px;
            min-height: 100vh;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .button {
            display: block;
            width: 100%;
            padding: 25px 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 20px;
            text-align: center;
            transition: transform 0.2s;
        }
        
        .button:active {
            transform: scale(0.98);
        }
        
        /* Синие кнопки — рабочие инструкции */
        .blue {
            background: #0078d4;
            color: white;
        }
        
        /* Красные кнопки — безопасность */
        .red {
            background: #d13400;
            color: white;
        }
        
        /* Иконки */
        .icon {
            margin-right: 10px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <h1>🏭 ЦТАИ — Цеховая библиотека</h1>
    
    <!-- Синие кнопки — рабочие документы -->
    <a class="button blue" href="https://disk.yandex.kz/d/NJ1_nVZUVDzfJQ">
        <span class="icon">📋</span>
        Должностные и профессиональные инструкции
    </a>
    
    <a class="button blue" href="https://disk.yandex.kz/d/Uxo_XUuPFGrjJQ>
        <span class="icon">⚙️</span>
        Производственные инструкции
    </a>
    
    <!-- Красные кнопки — безопасность -->
    <a class="button red" href="https://disk.yandex.kz/d/GB0tYHyy8DoAMQ">
        <span class="icon">⛑️</span>
        Инструкция по охране труда 
    </a>
    
    <a class="button red" href=https://disk.yandex.kz/d/GB0tYHyy8DoAMQ>
        <span class="icon">🔥</span>
       Инструкция по пожарной безопасности
    </a>
</body>
</html>
