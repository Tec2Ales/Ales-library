<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Библиотека инструкций АО «АлЭС»</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #1a1a1a;
            color: white;
            padding: 20px;
            min-height: 100vh;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            text-align: center;
        }
        h2 {
            font-size: 24px;
            margin-bottom: 25px;
            text-align: center;
        }
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .shop-btn {
            background: #2d2d2d;
            color: white;
            border: none;
            padding: 20px 10px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-left: 6px solid #0078d4;
        }
        .shop-btn:hover {
            background: #3a3a3a;
        }
        .shop-btn:active {
            transform: scale(0.97);
        }
        .link-btn {
            display: block;
            width: 100%;
            padding: 25px 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 20px;
            text-align: center;
            transition: transform 0.2s;
            background: #0078d4;
            color: white;
        }
        .link-btn.red {
            background: #d13400;
        }
        .link-btn:active {
            transform: scale(0.98);
        }
        .back-btn {
            background: #3a3a3a;
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            text-align: center;
            transition: background 0.2s;
        }
        .back-btn:hover {
            background: #4a4a4a;
        }
        .icon {
            margin-right: 10px;
            font-size: 24px;
        }
        #shop-view {
            display: none;
        }
        .note {
            text-align: center;
            margin-top: 20px;
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>

<!-- Главный экран: выбор цеха -->
<div id="main-view">
    <h1>🏭 Выберите цех</h1>
    <div class="button-grid" id="shop-buttons"></div>
    <div class="note">После выбора откроются инструкции цеха</div>
</div>

<!-- Экран цеха: список инструкций -->
<div id="shop-view">
    <h2 id="shop-title"></h2>
    <div id="shop-links"></div>
    <button class="back-btn" id="back-btn">← Назад к списку цехов</button>
</div>

<script>
    // ------------------------------------------------------------
    // НАСТРОЙКИ: СПИСОК ЦЕХОВ И ССЫЛКИ
    // ------------------------------------------------------------
    const shops = [
        { id: 1, name: 'ЭЦ (Электрический цех)' },
        { id: 2, name: 'ТЦ (Турбинный цех)' },
        { id: 3, name: 'КЦ (Котельный цех)' },
        { id: 4, name: 'ТТЦ (Топливно-транспортный цех)' },
        { id: 5, name: 'ХЦ (Химический цех)' },
        { id: 6, name: 'ЦТАИ (Цех тепловой автоматики и измерений)' },
        { id: 7, name: 'МЦ (Мазутный цех)' },
        { id: 8, name: 'РСЦ (Ремонтно-строительный цех)' },
        { id: 9, name: 'ЦНиПД (Цех наладки и проектной документации)' },
        { id: 10, name: 'ЦПР (Цех подготовки ремонтов)' }
    ];

    // ССЫЛКИ ДЛЯ КАЖДОГО ЦЕХА (все ссылки реальные, проверены)
    const shopLinks = {
        1: {  // ЭЦ
            dolg: 'https://disk.yandex.kz/d/NJ1_nVZUVDzfJQ',
            proiz: 'https://disk.yandex.kz/d/Uxo_XUuPFGrjJQ',
            ohrana: 'https://disk.yandex.kz/d/GB0tYHyy8DoAMQ',
            pojar: 'https://disk.yandex.kz/d/ibhsWN5fu1Wklw'
        },
        2: {  // ТЦ
            dolg: 'https://disk.yandex.kz/d/ns3YtyPjfJ4oeQ',
            proiz: 'https://disk.yandex.kz/d/YLQTd7XePiiRFA',
            ohrana: 'https://disk.yandex.kz/d/aaZeU2UfNZnBTw',
            pojar: 'https://disk.yandex.kz/d/zfzAxhuupkGngg'
        },
        3: {  // КЦ
            dolg: 'https://disk.yandex.kz/d/driLo1505YSUHA',
            proiz: 'https://disk.yandex.kz/d/7weSTfo14F6YVw',
            ohrana: 'https://disk.yandex.kz/d/6F0ehqS3E4rusg',
            pojar: 'https://disk.yandex.kz/d/BZMbGPP2v5lzrw'
        },
        4: {  // ТТЦ
            dolg: 'https://disk.yandex.kz/d/5ly939lEk_RPQA',
            proiz: 'https://disk.yandex.kz/d/miL0HyG8yOOGcw',
            ohrana: 'https://disk.yandex.kz/d/kkghVo2Ab8na2w',
            pojar: 'https://disk.yandex.kz/d/Z5ndQudzplwA5w'
        },
        5: {  // ХЦ
            dolg: 'https://disk.yandex.kz/d/7BeQ44-3o3BYGg',
            proiz: 'https://disk.yandex.kz/d/tMyUhS8H-gz9mA',
            ohrana: 'https://disk.yandex.kz/d/cMQc9cSx2cO1Og',
            pojar: 'https://disk.yandex.kz/d/ycDoFbPDnnWL7w'
        },
        6: {  // ЦТАИ
            dolg: 'https://disk.yandex.kz/d/TDlWb6SvX67f-Q', 
            proiz: 'https://disk.yandex.kz/d/1DaO1aZT-Uit7g', 
            ohrana: 'https://disk.yandex.kz/d/WoAKUTEkDLXd8Q', 
            pojar: 'https://disk.yandex.kz/d/NO22Mux4iA4MbA' 
        },
        7: {  // МЦ
            dolg: 'https://disk.yandex.kz/d/a7dpQB7ZLwvQtg',
            proiz: 'https://disk.yandex.kz/d/SHqU9jPQZXX3HQ',
            ohrana: 'https://disk.yandex.kz/d/ptnitMVtkz2b_g',
            pojar: 'https://disk.yandex.kz/d/fBOd0WVmSlBmSA'
        },
        8: {  // РСЦ
            dolg: 'https://disk.yandex.kz/d/ZckJxM1Xsro26A',
            proiz: 'https://disk.yandex.kz/d/viuJhktSclhmNQ',
            ohrana: 'https://disk.yandex.kz/d/Bof5xeeSWogmcA',
            pojar: 'https://disk.yandex.kz/d/701e57tEweN51w'
        },
        9: {  // ЦНиПД
            dolg: 'https://disk.yandex.kz/d/BExmLh_NIrA3Vw',
            proiz: 'https://disk.yandex.kz/d/FZcd8pXd2A-Uqg',
            ohrana: 'https://disk.yandex.kz/d/1kkuSKD-xSvW9g',
            pojar: 'https://disk.yandex.kz/d/7VmaJJS7lVPM6A'
        },
        10: {  // ЦПР
            dolg: 'https://disk.yandex.kz/d/7CLBPd8nnaGirg',
            proiz: 'https://disk.yandex.kz/d/8_pn4C21mG3hKA',
            ohrana: 'https://disk.yandex.kz/d/whPB4a30UzC2AA',
            pojar: 'https://disk.yandex.kz/d/ZC0gZp9OG9xM1A'
        }
    };

    // ------------------------------------------------------------
    // ЛОГИКА РАБОТЫ (НИЧЕГО НЕ МЕНЯЙТЕ)
    // ------------------------------------------------------------
    const mainView = document.getElementById('main-view');
    const shopView = document.getElementById('shop-view');
    const shopTitle = document.getElementById('shop-title');
    const shopLinksDiv = document.getElementById('shop-links');
    const backBtn = document.getElementById('back-btn');
    const shopButtonsDiv = document.getElementById('shop-buttons');

    // Создаём кнопки выбора цехов
    shops.forEach(shop => {
        const btn = document.createElement('button');
        btn.className = 'shop-btn';
        btn.textContent = `${shop.id}. ${shop.name}`;
        btn.addEventListener('click', () => showShop(shop.id, shop.name));
        shopButtonsDiv.appendChild(btn);
    });

    function showShop(shopId, shopName) {
        shopTitle.textContent = `Цех №${shopId} — ${shopName}`;
        const links = shopLinks[shopId];
        if (!links || Object.values(links).every(v => !v)) {
            shopLinksDiv.innerHTML = '<p style="text-align:center; color: #ffaa00;">⚠️ Ссылки для этого цеха ещё не настроены. Обратитесь к администратору.</p>';
        } else {
            let html = '';
            if (links.dolg) html += `<a class="link-btn" href="${links.dolg}" target="_blank"><span class="icon">📋</span>Должностные и проф. инструкции</a>`;
            if (links.proiz) html += `<a class="link-btn" href="${links.proiz}" target="_blank"><span class="icon">⚙️</span>Производственные инструкции</a>`;
            if (links.ohrana) html += `<a class="link-btn red" href="${links.ohrana}" target="_blank"><span class="icon">⛑️</span>Инструкция по охране труда</a>`;
            if (links.pojar) html += `<a class="link-btn red" href="${links.pojar}" target="_blank"><span class="icon">🔥</span>Инструкция по пожарной безопасности</a>`;
            shopLinksDiv.innerHTML = html;
        }
        mainView.style.display = 'none';
        shopView.style.display = 'block';
    }

    backBtn.addEventListener('click', () => {
        shopView.style.display = 'none';
        mainView.style.display = 'block';
    });

    // Прямой переход по ?shop=id (для отдельных QR-кодов)
    const urlParams = new URLSearchParams(window.location.search);
    const shopParam = urlParams.get('shop');
    if (shopParam && !isNaN(shopParam)) {
        const shopId = parseInt(shopParam);
        const shop = shops.find(s => s.id === shopId);
        if (shop) showShop(shopId, shop.name);
    }
</script>
</body>
</html>
